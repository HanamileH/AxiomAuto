{% extends "base.html" %}

{% block title %}Войти в аккаунт{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
<div class="auth-container">
   <h1>Войти в аккаунт</h1>
   <p class="subtitle">Войдите в свою учётную запись для доступа к системе</p>

   <div id="error-box" class="error-box" style="display:none;"></div>

   <form id="auth-form" class="auth-form" onsubmit="return false;">
      <div class="form-group">
         <label for="email">Электронная почта</label>
         <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
         <label for="password">Пароль</label>
         <input type="password" id="password" name="password" required>
      </div>

      <button type="submit" class="btn-auth" id="btn-auth">Войти</button>
   </form>

   <p class="auth-link">
      Ещё нет аккаунта? <a href="/register">Зарегистрироваться</a>
   </p>
</div>

<script src="{{ url_for('static', filename='js/login.js') }}"></script>
{% endblock %}
