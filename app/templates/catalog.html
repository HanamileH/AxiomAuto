{% extends "base.html" %}

<!-- Заголовок окна -->
{% block title %}Каталог автомобилей{% endblock %}

<!-- Подключаем доп стиль -->
{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/catalog.css') }}">
{% endblock %}

<!-- Контент окна -->
{% block content %}
<h1 class="title">Каталог автомобилей</h1>

<!-- Фильтры поиска -->
<div class="filters-card">
   <h2>Фильтры</h2>
   <div class="filters-panel">
      <input type="text" placeholder="Производитель" id="filter-brand">
      <input type="text" placeholder="Модель" id="filter-model">
      <input type="number" placeholder="Год от" id="filter-year-from">
      <input type="number" placeholder="Год до" id="filter-year-to">
      <input type="number" placeholder="Цена от" id="filter-price-from">
      <input type="number" placeholder="Цена до" id="filter-price-to">
      <select id="filter-engine-type" name="engine_type">
         <option value="">Тип двигателя</option>
         <option value="petrol">Бензин</option>
         <option value="diesel">Дизель</option>
         <option value="electric">Электро</option>
         <option value="hybrid">Гибрид</option>
      </select>
      <select id="filter-transmission" name="transmission">
         <option value="">Коробка передач</option>
         <option value="manual">Механика</option>
         <option value="automatic">Автомат</option>
         <option value="variator">Вариатор</option>
         <option value="robotic">Роботизированная</option>
      </select>
      <input type="number" placeholder="Мин. объем двигателя (л)" step="0.1" id="filter-engine-volume-min">
      <input type="number" placeholder="Мин. мощность (л.с.)" id="filter-engine-power-min">
   </div>
</div>

<!-- Панель карточек -->
<div class="catalog" id="catalog-list">
   {% include "_catalog_cards.html" %}
</div>

<script src="{{ url_for('static', filename='js/catalog.js') }}"></script>

{% endblock %}
