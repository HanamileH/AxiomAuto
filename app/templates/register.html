{% extends "base.html" %}

{% block title %}Регистрация{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}">
{% endblock %}

{% block content %}
<div class="register-container">
   <h1>Регистрация</h1>
   <p class="subtitle">Создайте учётную запись для доступа к системе</p>

   <div id="error-box" class="error-box" style="display:none;"></div>

   <form id="register-form" class="register-form" onsubmit="return false;">
      <div class="form-group">
         <label for="name">Имя</label>
         <input type="text" id="name" name="name" required>
      </div>

      <div class="form-group">
         <label for="surname">Фамилия</label>
         <input type="text" id="surname" name="surname" required>
      </div>

      <div class="form-group">
         <label for="patronymic">Отчество</label>
         <input type="text" id="patronymic" name="patronymic">
      </div>

      <div class="form-group">
         <label for="email">Электронная почта</label>
         <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
         <label for="phone">Телефон</label>
         <input type="tel" id="phone" name="phone" required>
      </div>

      <div class="form-group">
         <label for="password">Пароль</label>
         <input type="password" id="password" name="password" required>
      </div>

      <div class="form-group">
         <label for="confirm-password">Повторите пароль</label>
         <input type="password" id="confirm-password" name="confirm-password" required>
      </div>

      <button type="submit" class="btn-register" id="btn-register">Создать аккаунт</button>
   </form>

   <p class="login-link">
      Уже есть аккаунт? <a href="/login">Войти</a>
   </p>
</div>

<script src="{{ url_for('static', filename='js/register.js') }}"></script>
{% endblock %}
